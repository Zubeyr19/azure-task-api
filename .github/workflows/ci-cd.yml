name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  AZURE_WEBAPP_NAME: azure-task-api

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore azure-task-api.sln

      - name: Build
        run: dotnet build azure-task-api.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test azure-task-api.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Publish coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

      - name: Publish app
        if: github.ref == 'refs/heads/main'
        run: dotnet publish src/AzureTaskApi/AzureTaskApi.csproj --configuration Release --output ./publish

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app
          path: ./publish

      - name: Deploy to Azure App Service
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
